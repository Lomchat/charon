version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      # Group minor/patch updates together to cut noise.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      # better-sqlite3 majors often need a Node bump — review manually.
      - dependency-name: better-sqlite3
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: /agent
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - python
